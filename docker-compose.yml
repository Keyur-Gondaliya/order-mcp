services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-orders}
      POSTGRES_USER: ${DB_USER:-orders}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-orders}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-orders} -d ${DB_NAME:-orders}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-orders}
      DB_USER: ${DB_USER:-orders}
      DB_PASSWORD: ${DB_PASSWORD:-orders}
      REDIS_URL: redis://redis:6379/0
      MCP_RATE_LIMIT: ${MCP_RATE_LIMIT:-60}
      MCP_RATE_WINDOW: ${MCP_RATE_WINDOW:-60}
      MCP_CACHE_TTL: ${MCP_CACHE_TTL:-30}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
